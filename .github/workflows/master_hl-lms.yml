# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - HL-LMS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: hllmsacr.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2350475C69D94B91ADCFAB4FCD59D4FE }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_43AFB80FBB6747ACB4116C1C78B215A7 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: hllmsacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2350475C69D94B91ADCFAB4FCD59D4FE }}/myapp:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'HL-LMS'
          slot-name: 'Production'
          images: 'hllmsacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2350475C69D94B91ADCFAB4FCD59D4FE }}/myapp:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_309ECC9EBBFA4996AE72D3FD65658D5E }}